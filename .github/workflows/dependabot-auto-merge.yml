name: Dependabot auto-merge

# Minor and patch Dependabot PRs merge themselves once the pull_request run
# of the existing readme-freshness check reports success. Major bumps are
# never touched here and always wait for manual review. Only the
# github-actions ecosystem is watched here (this is a docs/tooling repo, no
# Dockerfile/requirements.txt/package.json of its own), and there's no
# deploy step to redispatch after merge.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Wait for checks and merge
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for i in $(seq 1 60); do
            run="$(gh api "repos/$REPO/commits/$SHA/check-runs?check_name=readme-freshness" --jq '.check_runs[0] // {}')"
            status="$(echo "$run" | jq -r '.status // "queued"')"
            conclusion="$(echo "$run" | jq -r '.conclusion // ""')"
            if [ "$status" = "completed" ]; then
              case "$conclusion" in
                success|neutral|skipped)
                  echo "readme-freshness passed."
                  break
                  ;;
                *)
                  echo "readme-freshness concluded '$conclusion'."
                  exit 1
                  ;;
              esac
            fi
            echo "Waiting on readme-freshness (status: $status)..."
            sleep 15
          done
          if [ "$status" != "completed" ]; then
            echo "Timed out waiting for readme-freshness."
            exit 1
          fi
          gh pr merge --squash --delete-branch "$PR_URL"
